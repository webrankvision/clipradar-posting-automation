[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt && python -c \"from faster_whisper import WhisperModel; WhisperModel('base', device='cpu', compute_type='int8'); print('Whisper model cached.')\""

[build.nixpacksPlan.phases.setup]
nixPkgs = ["ffmpeg"]

[deploy]
startCommand = "python worker.py"
restartPolicyType = "always"
restartPolicyMaxRetries = 10
